<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark Learning – Maintenance</title>
  <link rel="icon" type="image/jpeg" href="images/Logo_noir.jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      object-fit: cover;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.75rem;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    p {
      font-size: 0.95rem;
      color: #9090b0;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .progress-wrap {
      background: #0f0f1a;
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .progress-bar {
      height: 100%;
      width: 65%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 999px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .eta {
      font-size: 0.8rem;
      color: #6060a0;
    }

    .eta strong {
      color: #818cf8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/Logo_noir.jpeg" alt="Spark Learning" class="logo" />
    <div class="badge">Maintenance en cours</div>
    <h1>On revient très vite !</h1>
    <p>
      Spark Learning est temporairement hors ligne pour une mise à jour.<br />
      Nous améliorons la plateforme pour vous offrir une meilleure expérience.
    </p>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="eta">Retour prévu prochainement — merci pour votre patience.</p>
  </div>
</body>
</html>
